<!-- ===================== MODAL REGISTRO ===================== -->
<div class="modal fade" id="registertype" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Como você quer se cadastrar?</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-grid gap-3">
          <button type="button" class="sty-button btn py-3 d-flex align-items-center justify-content-center gap-2"
            onclick="location.href='/registre/register_specialist/'">
            <i class="bi bi-person-badge-fill fs-5"></i>
            <div class="text-start">
              <div class="reg-text-bold">Sou Profissional</div>
              <div class="reg-text-sub">Psicólogo, neuropsicólogo ou especialista</div>
            </div>
          </button>
          <button type="button" class="btn py-3 modal-register-btn d-flex align-items-center justify-content-center gap-2"
            onclick="location.href='/registre/register_user/'">
            <i class="bi bi-person-fill fs-5 text-orange"></i>
            <div class="text-start">
              <div class="reg-text-bold">Sou Paciente</div>
              <div class="reg-text-sub-sm">Busco suporte e acompanhamento</div>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
