{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM | {% block title %}{% endblock %}</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'img/favicon_sm.ico' %}">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/global_style.css' %}">
    {% block styles %}{% endblock %}


</head>

<body>
    {% if add_nav is not False %}
    <!-- ===================== NAVBAR ===================== -->
    <nav id="nav" class="navbar navbar-expand-lg fixed-top nav-main">
        <div class="container-fluid px-3">
            {% block content_nav %}{% endblock %}
        </div>
    </nav>
    {% endif %}
    <!-- Conteudo Principal -->
    {% block content %}{% endblock %}

    <!-- Custom js-->
    <script src="{% static 'js/global_script.js' %}"></script>
    {% block scripts %}{% endblock %}

</body>

</html>
